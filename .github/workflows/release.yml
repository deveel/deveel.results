name: Release

permissions:
  packages: write
  contents: read

on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      version:
        type: string
        required: true
        description: "The version of the package to release"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: [8.0.x,9.0.x, 10.0.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Emit .NET 8.0 Framework Moniker
      if: matrix.dotnet-version == '8.0.x'
      run: echo "DOTNET_FX_VERSION=net8.0" >> $GITHUB_ENV

    - name: Emit .NET 9.0 Framework Moniker
      if: matrix.dotnet-version == '9.0.x'
      run: echo "DOTNET_FX_VERSION=net9.0" >> $GITHUB_ENV

    - name: Emit .NET 10.0 Framework Moniker
      if: matrix.dotnet-version == '10.0.x'
      run: echo "DOTNET_FX_VERSION=net10.0" >> $GITHUB_ENV

    - name: Setup .NET ${{ matrix.dotnet-version }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Install dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build -c Release --no-restore -f ${{ env.DOTNET_FX_VERSION }}

    - name: Test
      run: dotnet test -c Release --no-build --no-restore -f ${{ env.DOTNET_FX_VERSION }}

  publish:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for GitVersion    
        
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
          
    - name: Install dependencies
      run: dotnet restore -p:TargetFrameworks=net10.0

    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v1.1.1
      with:
         versionSpec: '5.x'

    - name: Calculate version
      id: gitversion
      uses: gittools/actions/gitversion/execute@v1.1.1
      with:
        useConfigFile: true

    - name: Build
      run: dotnet build -c Release --no-restore /p:Version="${{ env.GitVersion_SemVer }}" /p:AssemblyVersion="${{ env.GitVersion_AssemblySemVer }}" /p:FileVersion="${{ env.GitVersion_AssemblySemFileVer }}"

    - name: Pack
      run: dotnet pack -c Release --no-build --no-restore --output ./pkgs --version-suffix --include-symbols /p:PackageVersion="${{ env.GitVersion_NuGetVersionV2 }}"

    - name: Publish to GitHub Packages
      run: dotnet nuget push ./pkgs/*.nupkg --source https://nuget.pkg.github.com/deveel/index.json --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate

    - name: Publish to NuGet
      run: dotnet nuget push ./pkgs/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate
